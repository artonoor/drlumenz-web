<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paipo's Mind Flight — a dr L game</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0d1b24; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: Georgia, serif; color: #e8dfc8; overflow: hidden; }
  #canvas { border: 1px solid #c9a84c22; border-radius: 12px; display: block; }
  #ui { position: fixed; top: 16px; left: 50%; transform: translateX(-50%); display: flex; gap: 32px; align-items: center; font-size: 13px; letter-spacing: 0.15em; color: #c9a84c; text-transform: uppercase; pointer-events: none; }
  #msg { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; pointer-events: all; transition: opacity 0.5s; z-index: 10; }
  #msg h2 { font-size: 1.54rem; color: #c9a84c; margin-bottom: 8px; }
  #msg p { font-size: 0.7rem; color: #e8dfc8; line-height: 1.8; max-width: 420px; }
  #msg .hint { font-size: 0.8rem; color: #7a9aaa; margin-top: 16px; letter-spacing: 0.15em; text-transform: uppercase; }
  #startBtn { margin-top: 24px; background: #c9a84c; color: #0d1b24; border: none; padding: 12px 32px; border-radius: 50px; font-family: Georgia, serif; font-size: 1rem; cursor: pointer; letter-spacing: 0.1em; }
  #startBtn:hover { background: #e0c068; }
  #pauseBtn { position: fixed; bottom: 20px; right: 20px; background: rgba(201,168,76,0.15); color: #c9a84c; border: 1px solid #c9a84c44; padding: 10px 20px; border-radius: 50px; font-family: Georgia, serif; font-size: 0.85rem; cursor: pointer; letter-spacing: 0.1em; z-index: 20; display: none; }
  #pauseBtn:hover { background: rgba(201,168,76,0.3); }
  #pauseOverlay { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); text-align: center; display: none; z-index: 15; }
  #pauseOverlay h3 { font-size: 2rem; color: #c9a84c; margin-bottom: 12px; }
  #pauseOverlay p { color: #7a9aaa; font-size: 0.85rem; letter-spacing: 0.2em; text-transform: uppercase; }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<button id="pauseBtn" onclick="togglePause()">⏸ Pause</button>
<div id="pauseOverlay">
  <h3>Paused</h3>
  <p>Click or press P to resume</p>
</div>

<div id="ui">
  <span>Lives: <span id="lives">3</span></span>
  <span>Score: <span id="score">0</span></span>
  <span id="zone">Zone: The Open Sky</span>
</div>

<div id="msg">
  <h2>Paipo's Mind Flight</h2>
  <p>Help Paipo fly through the storm of distractions.<br>Navigate the noise. Dodge the doubts.<br>Find the one secret move at the end.</p>
  <p class="hint">↑ ↓ or tap to fly · Space to slow down</p>
  <button id="startBtn" onclick="startGame()">Begin the Flight →</button>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const W = canvas.width = Math.min(900, window.innerWidth - 32);
const H = canvas.height = Math.min(500, window.innerHeight - 80);

// Game state
let state = 'idle'; // idle, playing, dead, won
let score = 0, lives = 3, frame = 0;
let paused = false;
let lastSpawnFrame = 0;

// Paipo — the macaw
const paipo = {
  x: 100, y: H/2,
  vy: 0, speed: 3,
  slow: false,
  w: 52, h: 36,
  wingAngle: 0,
  color: '#e84040',
  bodyColor: '#2255cc',
  tailColor: '#f5c842',
};

// Obstacles
let obstacles = [];
let particles = [];
let stars = [];
let scrollX = 0;
let worldX = 0;
let zone = 0;
const ZONES = ['The Open Sky', 'Storm of Noise', 'Valley of Doubt', 'The Fear Winds', 'The Tower of Fear'];
const ZONE_LEN = 4000;
const TOTAL_LEN = ZONE_LEN * ZONES.length;
let towerFired = false;
let towerShots = [];
let towerShotsFired = 0;
let secretFound = false;
let towerWarning = false;
let towerWarningTimer = 0;
let won = false;
let victoryFrame = 0;
let towerVictory = false;

// Stars background
for (let i = 0; i < 80; i++) {
  stars.push({ x: Math.random()*W, y: Math.random()*H, r: Math.random()*1.5+0.3, speed: Math.random()*0.5+0.2 });
}

function startGame() {
  document.getElementById('msg').style.opacity = '0';
  setTimeout(() => document.getElementById('msg').style.display='none', 500);
  state = 'playing';
  score = 0; lives = 3; frame = 0; worldX = 0; zone = 0;
  obstacles = []; particles = []; towerFired = false; towerShots = []; towerShotsFired = 0; nextPhraseIndex = 0; lastSpawnFrame = 0;
  secretFound = false; towerWarning = false; won = false; victoryFrame = 0; towerVictory = false;
  paipo.y = H/2; paipo.vy = 0;
  keys = {}; touchY = null;
  document.getElementById('pauseBtn').style.display = 'block';
  document.getElementById('msg').style.display = 'none';
  updateUI();
  setTimeout(loop, 200);
}

// Input
let keys = {};
document.addEventListener('keydown', e => {
  if (state !== 'playing') return;
  if ((e.code === 'ArrowUp' || e.code === 'KeyW') && !keys[e.code]) {
    paipo.vy = -6.5; // tap = flap burst
  }
  if (e.code === 'ArrowDown' || e.code === 'KeyS') paipo.vy += 2;
  if (e.code === 'Space') { e.preventDefault(); paipo.slow = true; }
  keys[e.code] = true;
});
document.addEventListener('keyup', e => {
  keys[e.code] = false;
  if (e.code === 'Space') paipo.slow = false;
});
// Click or tap anywhere to flap
function doFlap() { if (state === 'playing') paipo.vy = -6.5; }
canvas.addEventListener('mousedown', doFlap);
canvas.addEventListener('touchstart', e => {
  if (state !== 'playing') return;
  paipo.vy = -6.5;
  e.preventDefault();
}, { passive: false });
canvas.addEventListener('touchend', () => {});
let touchY = null;

// Negative thought phrases — 4 lines each, stacked as one tall obstacle
const THOUGHT_PHRASES = [
  { lines: ["You will", "never", "truly", "fly"],              color: '#c97a4c', zone: 0 },
  { lines: ["This is", "too hard", "for you", "give up"],      color: '#6b35ff', zone: 1 },
  { lines: ["You always", "quit", "every", "time"],            color: '#4c8fcf', zone: 2 },
  { lines: ["Nobody", "believes", "in", "you"],                color: '#4c8fcf', zone: 2 },
  { lines: ["It will", "not work", "it never", "does"],        color: '#cf4c6b', zone: 3 },
  { lines: ["You will", "fail", "like you", "always do"],      color: '#cf4c6b', zone: 3 },
  { lines: ["You are", "not", "enough", "—ever"],              color: '#9b4ccf', zone: 4 },
  { lines: ["Stop now", "while you", "still", "can"],          color: '#9b4ccf', zone: 4 },
];
let nextPhraseIndex = 0;

function spawnObstacle() {
  if (nextPhraseIndex >= THOUGHT_PHRASES.length) return;
  const phrase = THOUGHT_PHRASES[nextPhraseIndex++];
  // Place text band in lower half so bird naturally rises above it
  const bandH = 220; // 4 lines × ~55px each
  const cy = H * 0.58 + (Math.random() - 0.5) * (H * 0.2);
  obstacles.push({
    x: W + 20,
    lines: phrase.lines,
    color: phrase.color,
    cy,
    bandH,
    w: 10,
    passed: false,
    speed: 1.0 + Math.random() * 0.2,
    alpha: 1,
  });
}

function spawnParticle(x, y, color) {
  for (let i = 0; i < 8; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = 2 + Math.random() * 4;
    particles.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s, life: 40, color });
  }
}

function drawPaipo(x, y, slow) {
  // Wing flap — bigger amplitude when tapping (vy strongly negative)
  const flapPower = paipo.vy < -2 ? 1.6 : 1.0;
  const wf = Math.sin(paipo.wingAngle) * 26 * flapPower;

  // Upper wing — large, sweeps high on flap
  ctx.fillStyle = '#4db8ff';
  ctx.beginPath();
  ctx.moveTo(x - 14, y - 4);
  ctx.quadraticCurveTo(x - 2, y - 38 - wf, x + 20, y - 10);
  ctx.quadraticCurveTo(x + 4, y - 6, x - 14, y - 4);
  ctx.fill();
  // Upper wing shimmer
  ctx.fillStyle = '#99ddff55';
  ctx.beginPath();
  ctx.moveTo(x - 8, y - 6);
  ctx.quadraticCurveTo(x + 2, y - 28 - wf * 0.7, x + 16, y - 12);
  ctx.quadraticCurveTo(x + 4, y - 8, x - 8, y - 6);
  ctx.fill();

  // Lower wing — sweeps down
  ctx.fillStyle = '#1a66cc';
  ctx.beginPath();
  ctx.moveTo(x - 14, y + 6);
  ctx.quadraticCurveTo(x, y + 32 + wf * 0.5, x + 22, y + 8);
  ctx.quadraticCurveTo(x + 4, y + 5, x - 14, y + 6);
  ctx.fill();

  // Tail — long, tapered, two feathers
  ctx.fillStyle = paipo.tailColor;
  ctx.beginPath();
  ctx.moveTo(x - 22, y - 4);
  ctx.lineTo(x - 58, y - 14 + wf * 0.2);
  ctx.lineTo(x - 50, y + 2);
  ctx.fill();
  ctx.fillStyle = '#e8a020';
  ctx.beginPath();
  ctx.moveTo(x - 20, y + 2);
  ctx.lineTo(x - 54, y + 10 + wf * 0.15);
  ctx.lineTo(x - 46, y + 18);
  ctx.fill();

  // Body — long and streamlined like a macaw
  ctx.fillStyle = paipo.bodyColor;
  ctx.beginPath();
  ctx.ellipse(x, y, 30, 12, -0.1, 0, Math.PI*2);
  ctx.fill();

  // Red chest / belly
  ctx.fillStyle = paipo.color;
  ctx.beginPath();
  ctx.ellipse(x + 8, y + 3, 14, 8, 0.15, 0, Math.PI*2);
  ctx.fill();

  // Head
  ctx.fillStyle = '#22aa44';
  ctx.beginPath();
  ctx.arc(x + 18, y - 6, 10, 0, Math.PI*2);
  ctx.fill();
  // Eye
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(x + 21, y - 8, 3.5, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(x + 22, y - 8, 2, 0, Math.PI*2); ctx.fill();
  // Beak — opens and closes like singing
  const beakOpen = Math.max(0, Math.sin(paipo.wingAngle * 0.7) * 4);
  ctx.fillStyle = '#f5c842';
  ctx.beginPath(); // upper beak
  ctx.moveTo(x + 27, y - 7);
  ctx.lineTo(x + 40, y - 5 - beakOpen * 0.4);
  ctx.lineTo(x + 27, y - 4 - beakOpen * 0.3);
  ctx.fill();
  ctx.fillStyle = '#d4a012';
  ctx.beginPath(); // lower beak
  ctx.moveTo(x + 27, y - 4 + beakOpen * 0.3);
  ctx.lineTo(x + 38, y - 3 + beakOpen * 0.6);
  ctx.lineTo(x + 27, y - 1);
  ctx.fill();

  // Slow glow
  if (slow) {
    ctx.save();
    ctx.globalAlpha = 0.25;
    ctx.fillStyle = '#c9a84c';
    ctx.beginPath(); ctx.arc(x, y, 36, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }
}

function drawTower(x) {
  const tTop = H * 0.3;
  const tH = H * 0.65;
  // Tower body
  ctx.fillStyle = '#1a2e3d';
  ctx.fillRect(x, tTop, 80, tH);
  // Stone texture overlay
  ctx.fillStyle = '#c9a84c11';
  ctx.fillRect(x, tTop, 80, tH);
  // Battlements top
  ctx.fillStyle = '#1a2e3d';
  for (let i = 0; i < 5; i++) {
    ctx.fillRect(x + i * 18, tTop - 24, 12, 24);
  }
  // 6 cannon heads evenly spaced down the tower
  const cannon_ys = [0.33, 0.42, 0.51, 0.60, 0.69, 0.78].map(p => H * p);
  cannon_ys.forEach(cy => {
    // Cannon socket (circle on tower wall)
    ctx.fillStyle = '#0d1b24';
    ctx.beginPath(); ctx.arc(x + 4, cy, 10, 0, Math.PI * 2); ctx.fill();
    // Cannon barrel
    ctx.fillStyle = '#c9a84c';
    ctx.fillRect(x - 28, cy - 6, 32, 12);
    // Barrel tip circle
    ctx.fillStyle = '#e0c068';
    ctx.beginPath(); ctx.arc(x - 28, cy, 7, 0, Math.PI * 2); ctx.fill();
  });
  // Label
  ctx.fillStyle = '#c9a84c';
  ctx.font = 'bold 11px Georgia';
  ctx.textAlign = 'center';
  ctx.shadowColor = '#c9a84c';
  ctx.shadowBlur = 10;
  ctx.fillStyle = towerVictory ? '#c9a84c' : '#c97a4c';
  ctx.fillText(towerVictory ? 'TOWER OF SUCCESS' : 'TOWER OF FEAR', x + 40, tTop - 58);
  ctx.shadowBlur = 0;
}

function drawObstacle(ob) {
  ctx.save();
  const LINE_H = 58;
  const FONT_SIZE = 44;
  const lines = ob.lines || [];
  const totalH = lines.length * LINE_H;
  const top = ob.cy - totalH / 2;

  // Glow band — covers all lines
  const bandGrad = ctx.createLinearGradient(0, top - 10, 0, top + totalH + 10);
  bandGrad.addColorStop(0,   ob.color + '00');
  bandGrad.addColorStop(0.15, ob.color + '44');
  bandGrad.addColorStop(0.85, ob.color + '44');
  bandGrad.addColorStop(1,   ob.color + '00');
  ctx.fillStyle = bandGrad;
  ctx.fillRect(ob.x - 10, top - 10, 520, totalH + 20);

  // Each line stacked cleanly
  ctx.font = `italic bold ${FONT_SIZE}px Georgia`;
  ctx.textAlign = 'left';
  ctx.shadowColor = ob.color;
  ctx.shadowBlur = 24;
  ctx.fillStyle = ob.color;
  lines.forEach((line, i) => {
    ctx.fillText(line, ob.x, top + FONT_SIZE + i * LINE_H);
  });
  ctx.shadowBlur = 0;
  ctx.restore();
}

function rect(ax,ay,aw,ah, bx,by,bw,bh) {
  return ax < bx+bw && ax+aw > bx && ay < by+bh && ay+ah > by;
}

function updateUI() {
  document.getElementById('lives').textContent = lives;
  document.getElementById('score').textContent = score;
  document.getElementById('zone').textContent = 'Zone: ' + (ZONES[zone] || ZONES[ZONES.length-1]);
}

function showEndScreen(win) {
  const msg = document.getElementById('msg');
  msg.style.display = 'flex';
  msg.style.flexDirection = 'column';
  msg.style.alignItems = 'center';
  msg.style.opacity = '1';
  if (win) {
    msg.innerHTML = `
      <h2>✦ You Found the Secret ✦</h2>
      <p>When Fear fired its lethal shots,<br>you continued to fly.<br>Fear said stop and return.<br>You chose differently.</p>
      <p style="color:#c9a84c;margin-top:16px;font-style:italic;">"The wise persist in spite of the fear,<br>and keep flying to see the danger in the eyes."</p>
      <p class="hint" style="margin-top:8px;">— dr L</p>
      <button class="startBtn" style="margin-top:24px;background:#c9a84c;color:#0d1b24;border:none;padding:12px 32px;border-radius:50px;font-family:Georgia,serif;font-size:1rem;cursor:pointer;" onclick="startGame()">Fly Again →</button>`;
  } else {
    msg.innerHTML = `
      <h2>Paipo fell.</h2>
      <p>The distractions won this time.<br>But the tower is still waiting.<br>And so is the secret.</p>
      <p class="hint" style="margin-top:16px;">Hint: at the final tower — try the Space bar</p>
      <button style="margin-top:24px;background:#c9a84c;color:#0d1b24;border:none;padding:12px 32px;border-radius:50px;font-family:Georgia,serif;font-size:1rem;cursor:pointer;" onclick="startGame()">Try Again →</button>`;
  }
}

let lastTime = 0;
function togglePause() {
  if (state !== 'playing' && state !== 'paused') return;
  if (state === 'playing') {
    state = 'paused';
    document.getElementById('pauseBtn').textContent = '▶ Resume';
    document.getElementById('pauseOverlay').style.display = 'block';
  } else {
    state = 'playing';
    document.getElementById('pauseBtn').textContent = '⏸ Pause';
    document.getElementById('pauseOverlay').style.display = 'none';
    lastTime = performance.now();
    loop();
  }
}
document.addEventListener('keydown', e => {
  if (e.code === 'KeyP') togglePause();
});

function runVictory() {
  requestAnimationFrame(runVictory);
  if (state !== 'victory') return;
  victoryFrame++;

  // Clear canvas
  const bgGrad = ctx.createLinearGradient(0, 0, W, 0);
  bgGrad.addColorStop(0, '#0d0010'); bgGrad.addColorStop(1, '#1a0d0d');
  ctx.fillStyle = bgGrad; ctx.fillRect(0, 0, W, H);
  stars.forEach(s => {
    ctx.fillStyle = 'rgba(232,223,200,0.3)';
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill();
  });

  const towerX = W * 0.7;
  const perchX = towerX + 40;
  const perchY = H * 0.3 - 28; // top of tower

  // Phase 1 (0-60): Paipo flies toward tower top
  if (victoryFrame < 60) {
    paipo.x += (perchX - paipo.x) * 0.08;
    paipo.y += (perchY - paipo.y) * 0.08;
    paipo.wingAngle += 0.25;
    paipo.vy = 0;
  } else {
    // Phase 2: landed — snap to perch
    paipo.x = perchX;
    paipo.y = perchY;
    paipo.wingAngle += 0.04;
  }

  // Tower transforms at frame 70
  if (victoryFrame >= 70) towerVictory = true;
  drawTower(towerX);

  // Gold victory glow radiates from tower top
  if (victoryFrame >= 60) {
    ctx.save();
    ctx.globalAlpha = Math.min(1, (victoryFrame - 60) / 30) * 0.4;
    const glowR = ctx.createRadialGradient(perchX, perchY, 0, perchX, perchY, 120);
    glowR.addColorStop(0, '#c9a84c'); glowR.addColorStop(1, '#c9a84c00');
    ctx.fillStyle = glowR;
    ctx.beginPath(); ctx.arc(perchX, perchY, 120, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // Draw Paipo — wings fully raised on landing
  const savedWingAngle = paipo.wingAngle;
  if (victoryFrame >= 60) paipo.wingAngle = -Math.PI/2; // wings up
  drawPaipo(paipo.x, paipo.y, false);
  paipo.wingAngle = savedWingAngle;

  // Victory text fades in
  if (victoryFrame >= 80) {
    ctx.save();
    ctx.globalAlpha = Math.min(1, (victoryFrame - 80) / 30);
    ctx.fillStyle = '#c9a84c';
    ctx.font = 'bold 28px Georgia';
    ctx.textAlign = 'center';
    ctx.shadowColor = '#c9a84c';
    ctx.shadowBlur = 20;
    ctx.fillText('✦ Fear becomes your perch ✦', W/2, H * 0.15);
    ctx.restore();
  }

  // After full animation — show win screen
  if (victoryFrame >= 160) {
    state = 'won';
    showEndScreen(true);
  }
}
requestAnimationFrame(runVictory);

function loop(ts = 0) {
  if (state !== 'playing') return;
  requestAnimationFrame(loop);

  const dt = Math.min(ts - lastTime, 50);
  lastTime = ts;
  frame++;

  // Background
  const bgGrad = ctx.createLinearGradient(0, 0, W, 0);
  const z = Math.min(zone, 4);
  const bgColors = ['#0d1b24','#1a0d24','#0d1a24','#1a1a0d','#1a0d0d'];
  bgGrad.addColorStop(0, bgColors[z]);
  bgGrad.addColorStop(1, bgColors[Math.min(z+1,4)]);
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, W, H);

  // Stars
  stars.forEach(s => {
    s.x -= s.speed * (paipo.slow ? 0.3 : 1);
    if (s.x < 0) s.x = W;
    ctx.fillStyle = `rgba(232,223,200,${0.3+s.r*0.2})`;
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill();
  });

  // Zone progress line
  const prog = Math.min(worldX / TOTAL_LEN, 1);
  ctx.fillStyle = '#ffffff11';
  ctx.fillRect(0, H-4, W, 4);
  ctx.fillStyle = '#c9a84c';
  ctx.fillRect(0, H-4, W * prog, 4);

  // Move world
  const spd = paipo.slow ? 1.2 : (2.5 + zone * 0.4);
  worldX += spd;
  zone = Math.min(Math.floor(worldX / ZONE_LEN), ZONES.length - 1);

  // Paipo controls
  paipo.wingAngle += paipo.slow ? 0.08 : 0.18;
  const gravity = frame < 480 ? 0 : (paipo.slow ? 0.04 : 0.09);
  paipo.vy += gravity;
  paipo.vy = Math.max(-10, Math.min(7, paipo.vy));
  paipo.y += paipo.vy;

  // Boundaries — soft bounce, no death during free fly
  if (paipo.y < 20) { paipo.y = 20; paipo.vy = Math.abs(paipo.vy) * 0.4; }
  if (paipo.y > H - 20) {
    paipo.y = H - 20;
    paipo.vy = -Math.abs(paipo.vy) * 0.4;
    if (frame > 480) loseLife();
  }

  // Free fly for first 30 seconds (~1800 frames at 60fps), then obstacles begin
  // 2-2-3-3-4 obstacles per zone, max 14 total
  const ZONE_COUNTS = [1, 1, 2, 2, 2];
  const zonePassed = obstacles.filter(o => o.passed).length;
  const totalAllowed = ZONE_COUNTS.slice(0, zone + 1).reduce((a, b) => a + b, 0);
  const noneOnScreen = obstacles.length === 0; // wait until obstacle fully exits before spawning next
  const minGap = 380; // frames between spawns
  if (frame > 480 && noneOnScreen && zonePassed < totalAllowed && (frame - lastSpawnFrame) > minGap && worldX < TOTAL_LEN - ZONE_LEN * 0.8) {
    lastSpawnFrame = frame;
    spawnObstacle();
  }

  // Tower zone
  const isTowerZone = worldX > TOTAL_LEN - ZONE_LEN * 0.85;

  // Cannonballs — start at 20s, fire every ~4s, stop when Tower zone begins
  if (frame > 1200 && frame % 240 === 0 && !isTowerZone) {
    const y = 60 + Math.random() * (H - 120);
    towerShots.push({ x: W + 10, y, vx: -5 - Math.random() * 2, r: 8 });
  }
  const towerX = W * 0.7;

  if (isTowerZone) {
    drawTower(towerX);
    // Tower warning pulse
    if (!towerFired) {
      towerWarningTimer++;
      if (towerWarningTimer % 30 < 15) {
        ctx.fillStyle = 'rgba(201,168,76,0.06)';
        ctx.fillRect(0,0,W,H);
      }
    }
    // Tower fires 5 cannonballs at staggered intervals, spread vertically
    const SHOT_HEIGHTS = [H*0.33, H*0.42, H*0.51, H*0.60, H*0.69, H*0.78];
    const shotInterval = 35; // frames between each shot
    if (towerWarningTimer > 60) {
      const shotsDue = Math.min(6, Math.floor((towerWarningTimer - 60) / shotInterval));
      if (shotsDue > towerShotsFired) {
        if (!paipo.slow) {
          const y = SHOT_HEIGHTS[towerShotsFired];
          towerShots.push({ x: towerX - 28, y, vx: -9 - towerShotsFired * 0.7, r: 9 });
          towerShotsFired++;
          if (towerShotsFired >= 6) towerFired = true;
        } else {
          // Secret — player slowing, tower stands down
          secretFound = true; score += 500; updateUI();
          state = 'victory'; victoryFrame = 0; towerVictory = false; return;
        }
      }
    }
  }

  // Tower shots
  towerShots = towerShots.filter(s => s.x > -20);
  towerShots.forEach(s => {
    s.x += s.vx;
    ctx.fillStyle = '#ff3333';
    ctx.shadowColor = '#ff6600';
    ctx.shadowBlur = 20;
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
    if (Math.abs(s.x - paipo.x) < 28 && Math.abs(s.y - paipo.y) < 24) {
      loseLife(); return;
    }
  });

  // Update obstacles
  obstacles = obstacles.filter(ob => ob.x > -600);
  obstacles.forEach(ob => {
    ob.x -= ob.speed * (paipo.slow ? 0.5 : 1);
    drawObstacle(ob);
    // Score — passed when text centre clears Paipo
    if (!ob.passed && ob.x < paipo.x - 80) {
      ob.passed = true;
      score += 10;
      updateUI();
    }
    // Collision — bird inside the danger band while text is on screen
    const lineCount = (ob.lines || []).length;
    const totalH = lineCount * 58;
    const bandTop = ob.cy - totalH / 2;
    const inXRange = ob.x < paipo.x + 20 && ob.x + 500 > paipo.x;
    const inBand = paipo.y > bandTop && paipo.y < bandTop + totalH;
    if (inXRange && inBand) {
      spawnParticle(paipo.x, paipo.y, ob.color);
      loseLife();
    }
  });

  // Particles
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy; p.life--;
    ctx.globalAlpha = p.life/40;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
  });

  // Draw Paipo
  drawPaipo(paipo.x, paipo.y, paipo.slow);

  // Zone label fade-in
  if (frame % (ZONE_LEN / spd * 0.95) < 90) {
    const alpha = Math.min(1, (frame % (ZONE_LEN/spd*0.95)) / 30) * Math.min(1, (90 - frame%(ZONE_LEN/spd*0.95))/30);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#c9a84c';
    ctx.font = '13px Georgia';
    ctx.textAlign = 'center';
    ctx.letterSpacing = '4px';
    ctx.fillText(ZONES[zone]?.toUpperCase(), W/2, 40);
    ctx.globalAlpha = 1;
  }

  // Free fly message
  if (frame < 480) {
    const alpha = frame < 120 ? frame/120 : (frame > 1600 ? (1800-frame)/200 : 1);
    ctx.globalAlpha = alpha * 0.7;
    ctx.fillStyle = '#c9a84c';
    ctx.font = '14px Georgia';
    ctx.textAlign = 'center';
    ctx.fillText('The Open Sky is yours. Fly free.', W/2, H - 40);
    ctx.globalAlpha = 1;
  }

  // Slow indicator
  if (paipo.slow) {
    ctx.fillStyle = '#c9a84c';
    ctx.font = '11px Georgia';
    ctx.textAlign = 'left';
    ctx.fillText('· SLOW ·', paipo.x + 40, paipo.y - 20);
  }

  // Win by passing whole world without tower challenge
  // Win: survived past total length, OR tower fired all 6 shots and they've all exited
  const towerDone = towerFired && towerShots.length === 0;
  if (worldX > TOTAL_LEN || towerDone) {
    state = 'won';
    showEndScreen(true);
  }
}

function loseLife() {
  lives--;
  updateUI();
  spawnParticle(paipo.x, paipo.y, '#ff3333');
  paipo.vy = -5;
  towerFired = false; towerShots = []; towerShotsFired = 0; towerWarningTimer = 0;
  if (lives <= 0) {
    state = 'dead';
    showEndScreen(false);
  } else {
    // Brief respawn pause
    paipo.y = H/2;
    obstacles = []; // clear on respawn
  }
}

// Initial draw
ctx.fillStyle = '#0d1b24';
ctx.fillRect(0,0,W,H);
stars.forEach(s => {
  ctx.fillStyle = `rgba(232,223,200,0.4)`;
  ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill();
});
drawPaipo(100, H/2, false);
</script>
